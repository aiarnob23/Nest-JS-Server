services:
  app-dev-1:
    container_name: nest-js-server-1
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    env_file:
      - .env.development
    environment:
      - INSTANCE_ID="instance-1"
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    profiles:
      - dev

  app-dev-2:
    container_name: nest-js-server-2
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    env_file:
      - .env.development
    environment:
      - INSTANCE_ID="instance-2"
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    profiles:
      - dev

  nginx:
    image: nginx:alpine
    container_name: nest-js-server-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-dev-1
      - app-dev-2
    profiles:
      - dev

  db:
    image: postgres:17-alpine
    container_name: nest-js-server-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - nest-js-server-db:/var/lib/postgresql/data
    profiles:
      - dev

volumes:
  nest-js-server-db: